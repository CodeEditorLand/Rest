[[bin]]
name = "BinaryRest"
path = "Source/Library.rs"

[[bin]]
name = "Rest"
path = "Source/Library.rs"

[build-dependencies]
serde = { version = "1.0.219", features = ["derive"] }
toml = { version = "0.9.0" }

[dependencies]
anyhow = { version = "1.0.98" }
chrono = { version = "0.4.41" }
clap = { features = ["derive"], version = "4.5.40" }
dashmap = { version = "6.1.0" }
futures = { version = "0.3.31" }
git2 = { version = "0.20.2" }
globset = { version = "0.4.16" }
itertools = { version = "0.14.0" }
notify = { version = "8.1.0" }
num_cpus = { version = "1.17.0" }
rayon = { version = "1.10.0" }
regex = { version = "1.11.1" }
serde = { version = "1.0.219" }
serde_json = { version = "1.0.140" }
swc_common = { version = "13.0.4" }
swc_ecma_ast = { version = "13.0.1" }
swc_ecma_codegen = { version = "15.0.2" }
swc_ecma_parser = { version = "19.0.0" }
swc_ecma_transforms_base = { version = "20.0.0", features = ["concurrent"] }
swc_ecma_transforms_proposal = { version = "20.0.0" }
swc_ecma_transforms_typescript = { version = "22.0.0" }
swc_ecma_visit = { version = "13.0.0" }
tokio = { version = "1.46.1", features = ["full"] }
tracing = { version = "0.1.41" }
tracing-subscriber = "0.3.19"
unbug = { version = "0.4.0" }
walkdir = { version = "2.5.0" }

[features]
default = []

[lib]
crate-type = ["staticlib", "cdylib", "rlib"]
name = "Library"
path = "Source/Library.rs"

[package]
autobenches = false
autobins = false
autoexamples = false
autotests = false
default-run = "Rest"
description = "Rest ⛱️"
edition = "2024"
include = [
	"Source/**/*",
	"LICENSE",
	"README.md",
	"CHANGELOG.md",
	"build.rs",
	"Cargo.toml",
]
license-file = "LICENSE"
name = "Rest"
repository = "https://github.com/BinaryRest/Rest.git"
version = "0.0.1"
